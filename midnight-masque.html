<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#06070d">
<title>MIDNIGHT MASQUE</title>
<style>
:root{
  --void:#06070d; --panel:#0b0e18; --line:#232a42;
  --wire:#8fb0d8; --ink:#e8e4da; --dim:#7a8199;
  --blood:#d43148; --gold:#d8b45a; --spc:#4f8fd0;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--void);color:var(--ink);
  font-family:Georgia,'Times New Roman',serif; min-height:100%;}
#wrap{max-width:520px;margin:0 auto;padding:8px;display:flex;flex-direction:column;gap:8px;}
#cv{width:100%;display:block;background:#000;border:1px solid var(--line);border-radius:4px;}
#hud{display:flex;flex-direction:column;gap:4px;font-size:12px;
  font-family:ui-monospace,Menlo,Consolas,monospace;}
.crow{display:flex;align-items:center;gap:6px;background:var(--panel);
  border:1px solid var(--line);border-radius:3px;padding:4px 8px;}
.crow.dead{opacity:.45;}
.cname{width:46px;letter-spacing:1px;}
.clv{width:30px;color:var(--dim);}
.bar{flex:1;height:8px;background:#141827;border-radius:2px;overflow:hidden;}
.bar i{display:block;height:100%;transition:width .3s;}
.hp i{background:linear-gradient(90deg,#8a1f2e,var(--blood));}
.sp i{background:linear-gradient(90deg,#274a74,var(--spc));}
.bnum{width:56px;text-align:right;color:var(--dim);}
.sbar{display:flex;align-items:center;gap:6px;padding:2px 0;}
.sbar .lbl{width:30px;color:var(--dim);font-size:11px;letter-spacing:.5px;}
.sbar .val{width:24px;text-align:right;color:var(--dim);font-size:11px;}
.sbar.str i{background:linear-gradient(90deg,#8a1f2e,var(--blood));}
.sbar.mag i{background:linear-gradient(90deg,#3d2266,#9a6ad8);}
.sbar.agi i{background:linear-gradient(90deg,#1f6a4a,#57d0a0);}
.sbar.def i{background:linear-gradient(90deg,#274a74,var(--spc));}
#log{background:var(--panel);border:1px solid var(--line);border-radius:3px;
  min-height:70px;padding:6px 10px;font-size:13px;line-height:1.45;}
#log .l0{color:var(--ink);}
#log .old{color:var(--dim);}
#ctl{display:flex;flex-direction:column;gap:6px;}
.row{display:flex;gap:6px;}
button{flex:1;background:#10141f;color:var(--ink);border:1px solid var(--line);
  border-radius:4px;padding:12px 6px;font-family:inherit;font-size:14px;
  letter-spacing:1px;cursor:pointer;min-height:46px;
  touch-action:manipulation;user-select:none;-webkit-user-select:none;}
button:active{background:#1a2133;}
button:focus-visible{outline:2px solid var(--wire);outline-offset:1px;}
button.red{border-color:#5c2430;color:#f0b7bd;background:#1a0d12;}
button.blue{border-color:#28407a;color:#b9cdf0;background:#0d1226;}
button.dis{opacity:.35;pointer-events:none;}
button.dis2{opacity:.45;}
button.small{min-height:40px;padding:8px 6px;font-size:12.5px;letter-spacing:.4px;text-align:left;padding-left:12px;}
.hint{font-size:11px;color:var(--dim);text-align:center;letter-spacing:1px;min-height:14px;padding-bottom:10px;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv" width="480" height="360"></canvas>
  <div id="hud"></div>
  <div id="log"></div>
  <div id="ctl"></div>

/* ============ SAVE / LOAD ============ */
function saveGame(){
 try{
  if(!window.storage) throw new Error('no storage');
  window.storage.set('midnight-masque-save', JSON.stringify(G)).then(function(r){
   log(r ? 'Recorded in the ledger. (Game saved)' : 'The ledger will not open. (Save failed)');
  }).catch(function(){ log('The ledger will not open. (Save failed)'); });
 }catch(e){ log('The ledger will not open. (Save unavailable here)'); }
}
function loadGame(){
 try{
  if(!window.storage) throw new Error('no storage');
  window.storage.get('midnight-masque-save').then(function(r){
   if(r && r.value){
    G=JSON.parse(r.value); B=null; MODE='explore'; UI=[]; LOGS=[];
    drone(!MUTED);
    log('The ledger remembers you. (Game loaded)');
    renderAll();
   } else { log('No record found in the ledger.'); }
  }).catch(function(){ log('No record found in the ledger.'); });
 }catch(e){ log('No record found. (Save unavailable here)'); }
}

/* ============ AUDIO ============ */
var AC=null;
function ac(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return AC; }
function beep(f,d,type,g){
 if(MUTED) return; var a=ac(); if(!a) return;
 try{
  var o=a.createOscillator(),v=a.createGain();
  o.type=type||'square'; o.frequency.value=f;
  v.gain.setValueAtTime(g||0.035,a.currentTime);
  v.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(d||0.08));
  o.connect(v); v.connect(a.destination);
  o.start(); o.stop(a.currentTime+(d||0.08)+0.02);
 }catch(e){}
}
var SFX={
 step:function(){beep(96,0.04,'triangle',0.02);},
 sel:function(){beep(660,0.05,'square',0.03);},
 back:function(){beep(330,0.05,'square',0.025);},
 hit:function(){beep(140,0.12,'sawtooth',0.05);},
 weak:function(){beep(140,0.1,'sawtooth',0.05); setTimeout(function(){beep(110,0.14,'sawtooth',0.06);},70);},
 heal:function(){beep(740,0.09,'sine',0.04); setTimeout(function(){beep(988,0.12,'sine',0.04);},80);},
 card:function(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){beep(f,0.1,'triangle',0.04);},i*80);});},
 moon:function(){beep(220,0.4,'sine',0.03);},
 die:function(){beep(98,0.3,'sawtooth',0.05);}
};
function drone(on){
 var a=ac(); if(!a) return;
 if(DRONE){
  try{
   DRONE.g.gain.setTargetAtTime(0.0001,a.currentTime,0.3);
   DRONE.o1.stop(a.currentTime+1); DRONE.o2.stop(a.currentTime+1);
  }catch(e){}
  DRONE=null;
 }
 if(on&&!MUTED){
  try{
   var o1=a.createOscillator(),o2=a.createOscillator(),g=a.createGain(),fl=a.createBiquadFilter();
   o1.type='sawtooth';o2.type='sawtooth';o1.frequency.value=55;o2.frequency.value=55.6;
   fl.type='lowpass';fl.frequency.value=180;
   g.gain.value=0.012;
   o1.connect(fl);o2.connect(fl);fl.connect(g);g.connect(a.destination);
   o1.start();o2.start(); DRONE={o1:o1,o2:o2,g:g};
  }catch(e){}
 }
}

/* ============ CANVAS / RENDERING ============ */
var CV=document.getElementById('cv'), CTX=CV.getContext('2d');
var DEPTH=4;
var SCL=[1,0.60,0.385,0.25,0.165];
function fwd(d){return [[0,-1],[1,0],[0,1],[-1,0]][d];}
function rightv(d){return fwd((d+1)%4);}
function mapAt(f,x,y){
 var m=MAPS[f];
 if(y<0||y>=m.length||x<0||x>=m[0].length) return '#';
 return m[y][x];
}
function isWall(x,y){return mapAt(G.floor,x,y)==='#';}
function cellOff(d,s){
 var f=fwd(G.dir),r=rightv(G.dir);
 return [G.x+f[0]*d+r[0]*s, G.y+f[1]*d+r[1]*s];
}
function px(scale){return {hw:W/2*scale, hh:H/2*scale};}
function theme(){ return THEMES[G.floor]||THEMES[0]; }
function frontConnected(z,s){
 if(s===0) return true;
 for(var zz=0; zz<=z; zz++){
  var c=cellOff(zz,s);
  if(!isWall(c[0],c[1])) return false;
 }
 return true;
}

function drawFront(sc,s,a,t,connected){
 var th=theme();
 var p=px(sc), cx=W/2, cy=H/2;
 var x=cx + s*2*p.hw - p.hw, y=cy-p.hh;
 CTX.globalAlpha=1; CTX.fillStyle=th.frontFill;
 CTX.fillRect(x,y,p.hw*2,p.hh*2);
 CTX.globalAlpha=a; CTX.strokeStyle=th.frontStroke; CTX.lineWidth=1.2;
 CTX.strokeRect(x+0.5,y+0.5,p.hw*2-1,p.hh*2-1);
 CTX.globalAlpha=a*0.3;
 CTX.beginPath(); CTX.moveTo(x,cy); CTX.lineTo(x+p.hw*2,cy); CTX.stroke();
 CTX.globalAlpha=1;
 if(connected) decorFront(th.decor,x,y,p.hw*2,p.hh*2,a,t);
}
function drawSide(sgn,near,far,a,t){
 var th=theme();
 var cx=W/2, cy=H/2, n=px(near), f=px(far);
 var xn=cx+sgn*n.hw, xf=cx+sgn*f.hw;
 var y1=cy-n.hh, y2=cy-f.hh, y3=cy+f.hh, y4=cy+n.hh;
 CTX.beginPath();
 CTX.moveTo(xn,y1); CTX.lineTo(xf,y2); CTX.lineTo(xf,y3); CTX.lineTo(xn,y4);
 CTX.closePath(); CTX.fillStyle=th.sideFill; CTX.fill();
 CTX.globalAlpha=a; CTX.strokeStyle=th.sideStroke; CTX.lineWidth=1.2; CTX.stroke();
 CTX.globalAlpha=1;
 decorSide(th.decor,xn,xf,y1,y2,y3,y4,a,t);
}
function drawOpenEdge(sgn,near,far,a){
 var th=theme();
 var cx=W/2, cy=H/2, n=px(near), f=px(far);
 var xn=cx+sgn*n.hw, xf=cx+sgn*f.hw;
 CTX.globalAlpha=a; CTX.strokeStyle=th.edgeStroke; CTX.lineWidth=1;
 CTX.beginPath(); CTX.moveTo(xn,cy+n.hh); CTX.lineTo(xf,cy+f.hh); CTX.stroke();
 CTX.beginPath(); CTX.moveTo(xn,cy-n.hh); CTX.lineTo(xf,cy-f.hh); CTX.stroke();
 CTX.globalAlpha=1;
}
function rung(sc,a){
 var th=theme();
 var p=px(sc), cx=W/2, cy=H/2;
 CTX.globalAlpha=a; CTX.strokeStyle=th.rungStroke; CTX.lineWidth=1;
 CTX.beginPath(); CTX.moveTo(cx-p.hw,cy+p.hh); CTX.lineTo(cx+p.hw,cy+p.hh); CTX.stroke();
 CTX.globalAlpha=1;
}
function decorFront(decor,x,y,w,h,a,t){
 if(w<8||h<8) return;
 CTX.save();
 CTX.beginPath(); CTX.rect(x,y,w,h); CTX.clip();
 if(decor==='school') decorSchoolFront(x,y,w,h,a);
 else if(decor==='basement') decorBasementFront(x,y,w,h,a,t);
 else if(decor==='psych') decorPsychFront(x,y,w,h,a,t);
 CTX.restore();
}
function decorSchoolFront(x,y,w,h,a){
 var pad=w*0.16, ww=w-2*pad, wy=y+h*0.2, wh=h*0.44;
 if(ww<4) return;
 CTX.globalAlpha=a*0.85; CTX.fillStyle='#d7e6ef';
 CTX.shadowColor='#9fd0e8'; CTX.shadowBlur=Math.max(2,w*0.08);
 CTX.fillRect(x+pad,wy,ww,wh);
 CTX.shadowBlur=0;
 CTX.globalAlpha=a*0.9; CTX.strokeStyle='#4a4527'; CTX.lineWidth=Math.max(1,w*0.02);
 CTX.strokeRect(x+pad,wy,ww,wh);
 CTX.beginPath();
 CTX.moveTo(x+pad+ww/2,wy); CTX.lineTo(x+pad+ww/2,wy+wh);
 CTX.moveTo(x+pad,wy+wh/2); CTX.lineTo(x+pad+ww,wy+wh/2);
 CTX.stroke();
 CTX.globalAlpha=a*0.25; CTX.strokeStyle='#cbb968';
 CTX.beginPath(); CTX.moveTo(x,y+h*0.82); CTX.lineTo(x+w,y+h*0.82); CTX.stroke();
 CTX.globalAlpha=1;
}
function decorBasementFront(x,y,w,h,a,t){
 CTX.globalAlpha=a*0.5; CTX.strokeStyle='#16220f'; CTX.lineWidth=Math.max(1,w*0.012);
 var cx0=x+w*0.32;
 CTX.beginPath();
 CTX.moveTo(cx0,y); CTX.lineTo(cx0+w*0.06,y+h*0.28);
 CTX.lineTo(cx0-w*0.04,y+h*0.55); CTX.lineTo(cx0+w*0.08,y+h*0.85);
 CTX.stroke();
 CTX.globalAlpha=a*0.3; CTX.fillStyle='#1c2b1a';
 CTX.fillRect(x+w*0.62,y,w*0.05,h*0.95);
 CTX.globalAlpha=a*0.18*(0.7+0.3*Math.sin((t||0)/260+x*0.05));
 CTX.fillStyle='#2f4a2c'; CTX.fillRect(x,y,w,h);
 CTX.globalAlpha=1;
}
function decorPsychFront(x,y,w,h,a,t){
 var hue=((t||0)/40 + x*0.5) % 360;
 CTX.globalAlpha=a*0.55; CTX.fillStyle='hsl('+hue+',85%,45%)';
 CTX.fillRect(x,y,w,h);
 CTX.globalAlpha=1;
}
function decorSide(decor,xn,xf,y1,y2,y3,y4,a,t){
 CTX.save();
 CTX.beginPath();
 CTX.moveTo(xn,y1); CTX.lineTo(xf,y2); CTX.lineTo(xf,y3); CTX.lineTo(xn,y4); CTX.closePath();
 CTX.clip();
 if(decor==='school'){
  CTX.globalAlpha=a*0.35; CTX.strokeStyle='#4a4527'; CTX.lineWidth=1;
  for(var i=1;i<4;i++){
   var xm=xn+(xf-xn)*i/4, ym1=y1+(y2-y1)*i/4, ym2=y4+(y3-y4)*i/4;
   CTX.beginPath(); CTX.moveTo(xm,ym1); CTX.lineTo(xm,ym2); CTX.stroke();
  }
 } else if(decor==='basement'){
  CTX.globalAlpha=a*0.3; CTX.strokeStyle='#2c3f2a'; CTX.lineWidth=Math.max(1,Math.abs(xf-xn)*0.05);
  var yy1=y1+(y4-y1)*0.4, yy2=y2+(y3-y2)*0.4;
  CTX.beginPath(); CTX.moveTo(xn,yy1); CTX.lineTo(xf,yy2); CTX.stroke();
 } else if(decor==='psych'){
  var hue=((t||0)/40 + xn*0.6) % 360;
  CTX.globalAlpha=a*0.4; CTX.fillStyle='hsl('+hue+',90%,55%)';
  CTX.beginPath(); CTX.moveTo(xn,y1); CTX.lineTo(xf,y2); CTX.lineTo(xf,y3); CTX.lineTo(xn,y4); CTX.closePath(); CTX.fill();
 }
 CTX.restore();
}
function draw3D(t){
 var th=theme();
 var gy=CTX.createLinearGradient(0,0,0,H);
 gy.addColorStop(0,th.bgTop); gy.addColorStop(0.5,th.bgMid); gy.addColorStop(1,th.bgBot);
 CTX.fillStyle=gy; CTX.fillRect(0,0,W,H);
 for(var z=DEPTH-1; z>=0; z--){
  var a=Math.max(0.16, 1-z*0.24);
  for(var s=-1;s<=1;s++){
   var fc=cellOff(z+1,s);
   if(mapAt(G.floor,fc[0],fc[1])==='#') drawFront(SCL[z+1],s,a*0.85,t,frontConnected(z,s));
  }
  var sides=[-1,1];
  for(var i=0;i<2;i++){
   var sg=sides[i], sc=cellOff(z,sg);
   if(mapAt(G.floor,sc[0],sc[1])==='#') drawSide(sg,SCL[z],SCL[z+1],a,t);
   else drawOpenEdge(sg,SCL[z],SCL[z+1],a*0.5);
  }
  rung(SCL[z+1],a*0.35);
 }
}
function drawSpecials(){
 for(var d=0; d<=2; d++){
  var blocked=false;
  for(var k=1;k<=d;k++){
   var pc=cellOff(k,0);
   if(mapAt(G.floor,pc[0],pc[1])==='#'){blocked=true;break;}
  }
  if(blocked) break;
  var tc=cellOff(d,0), c=mapAt(G.floor,tc[0],tc[1]);
  if('V>HTB'.indexOf(c)>=0){
   if(c==='T' && G.opened[G.floor+':'+tc[0]+','+tc[1]]) continue;
   if(c==='B' && G.bossDead) continue;
   var sc = d===0 ? 1.0 : SCL[d];
   var cy=H/2 + H/2*sc*0.7;
   var size=Math.round(34*sc);
   var col = c==='V' ? '#6a8dff' : c==='H' ? '#57d0a0' : c==='T' ? '#d8b45a' : c==='B' ? '#e0364a' : '#c9d4ee';
   var sym = c==='V' ? '\u9580' : c==='H' ? '\u6cc9' : c==='T' ? '\u5323' : c==='B' ? '\u6708' : '\u6bb5';
   CTX.save();
   CTX.globalAlpha=0.92;
   CTX.fillStyle=col;
   CTX.font=size+'px Georgia';
   CTX.textAlign='center'; CTX.textBaseline='middle';
   CTX.shadowColor=col; CTX.shadowBlur=12*sc;
   CTX.fillText(sym, W/2, cy - size*0.7);
   CTX.restore();
  }
 }
}

/* ============ HUD / LOG / CONTROLS ============ */
function el(id){return document.getElementById(id);}
function log(msg){
 LOGS.push(msg); if(LOGS.length>4) LOGS.shift();
 var htm='';
 for(var i=0;i<LOGS.length;i++){
  htm+='<div class="'+(i===LOGS.length-1?'l0':'old')+'">'+LOGS[i]+'</div>';
 }
 el('log').innerHTML=htm;
}
function renderHUD(){
 if(!G){el('hud').innerHTML='';return;}
 var htm='';
 for(var i=0;i<G.party.length;i++){
  var c=G.party[i], mh=maxHp(c), ms=maxSp(c);
  htm+='<div class="crow'+(c.hp<=0?' dead':'')+'">'
   +'<span class="cname">'+c.name+'</span><span class="clv">L'+c.lv+'</span>'
   +'<div class="bar hp"><i style="width:'+Math.max(0,100*c.hp/mh)+'%"></i></div>'
   +'<span class="bnum">'+Math.max(0,c.hp)+'/'+mh+'</span>'
   +'<div class="bar sp"><i style="width:'+Math.max(0,100*c.sp/ms)+'%"></i></div>'
   +'<span class="bnum">'+c.sp+'/'+ms+'</span>'
   +'</div>';
 }
 el('hud').innerHTML=htm;
}
function btnEl(label,fn,cls){
 var b=document.createElement('button');
 b.innerHTML=label; if(cls) b.className=cls;
 b.addEventListener('click',function(){
  if(AC&&AC.state==='suspended'){try{AC.resume();}catch(e){}}
  fn();
 });
 return b;
}
function rows(){
 var c=el('ctl'); c.innerHTML='';
 for(var i=0;i<arguments.length;i++){
  var d=document.createElement('div'); d.className='row';
  var r=arguments[i];
  for(var j=0;j<r.length;j++) d.appendChild(r[j]);
  c.appendChild(d);
 }
}
function renderAll(){ renderHUD(); refreshCtl(); }

/* ============ EXPLORATION ============ */
function turn(s){ if(busy())return; G.dir=(G.dir+s+4)%4; SFX.step(); renderAll(); }
function busy(){ return MODE!=='explore'; }
function move(dz){
 if(busy())return;
 var f=fwd(G.dir);
 var nx=G.x+f[0]*dz, ny=G.y+f[1]*dz;
 if(isWall(nx,ny)){ SFX.back(); return; }
 G.x=nx; G.y=ny; SFX.step(); markExplored(); afterStep();
}
function afterStep(){
 G.steps++;
 G.moonSteps++;
 if(G.moonSteps>=STEPS_PER_PHASE){
  G.moonSteps=0; G.moon=(G.moon+1)%8;
  if(G.moon===4){ log('The FULL MOON rises. The aspects will not listen now \u2014 only fight.'); SFX.moon(); }
  else log('The moon turns to '+MOONS[G.moon]+'.');
 }
 var c=mapAt(G.floor,G.x,G.y);
 if(c==='>') log('Stairs descend into the dark. (interact to go down)');
 else if(c==='V') log('A blue door, humming faintly. (interact to enter the Azure Room)');
 else if(c==='H') log('A still spring glimmers here. (interact to drink)');
 else if(c==='T' && !G.opened[G.floor+':'+G.x+','+G.y]) log('A strongbox rests here. (interact to open)');
 else if(c==='B' && !G.bossDead) log('The air freezes. Something vast waits ahead. (interact to face it)');
 if('SVH>B'.indexOf(c)<0){
  var full=G.moon===4;
  var rate= full?0.2:0.13;
  if(Math.random()<rate) startBattle();
 }
 renderAll();
}
function tileAction(){
 var c=mapAt(G.floor,G.x,G.y);
 if(c==='>') return {label:'\u25b2 DESCEND',fn:descend,cls:''};
 if(c==='V') return {label:'AZURE ROOM',fn:enterVelvet,cls:'blue'};
 if(c==='H') return {label:'DRINK (20 ob)',fn:useSpring,cls:''};
 if(c==='T' && !G.opened[G.floor+':'+G.x+','+G.y]) return {label:'OPEN CHEST',fn:openChest,cls:''};
 if(c==='B' && !G.bossDead) return {label:'FACE THE GATE',fn:bossIntro,cls:'red'};
 return null;
}
function descend(){
 if(G.floor>=MAPS.length-1){ log('The stairs are sealed below. Nowhere left to descend.'); return; }
 G.floor++; placeAtStart();
 log('You descend to '+FLOOR_NAMES[G.floor]+'.');
 markExplored(); renderAll();
}
function placeAtStart(){
 var m=MAPS[G.floor];
 for(var y=0;y<m.length;y++) for(var x=0;x<m[0].length;x++){
  if(m[y][x]==='S'){ G.x=x; G.y=y; G.dir=isWall(x+1,y)?2:1; return; }
 }
}
function useSpring(){
 if(G.coins<20){ log('The spring wants 20 obols. You have '+G.coins+'.'); return; }
 G.coins-=20;
 for(var i=0;i<G.party.length;i++){
  var c=G.party[i]; if(c.hp>0){ c.hp=maxHp(c); c.sp=maxSp(c); }
 }
 SFX.heal(); log('The living drink deep. HP and SP restored. (\u221220 obols)');
 renderAll();
}
function chestIndex(){
 var m=MAPS[G.floor], n=0;
 for(var y=0;y<m.length;y++) for(var x=0;x<m[0].length;x++){
  if(m[y][x]==='T'){ if(x===G.x&&y===G.y) return n; n++; }
 }
 return -1;
}
function openChest(){
 var key=G.floor+':'+G.x+','+G.y;
 if(G.opened[key]){ log('Already emptied.'); return; }
 var idx=chestIndex();
 var loot=CHEST_LOOT[G.floor][idx];
 G.opened[key]=true;
 if(loot[0]==='coins'){ G.coins+=loot[1]; log('The strongbox holds '+loot[1]+' obols.'); }
 else if(loot[0]==='item'){ G.inv[loot[1]]=(G.inv[loot[1]]||0)+loot[2]; log('You find '+loot[2]+'\u00d7 '+loot[1]+'.'); }
 else if(loot[0]==='card'){ G.cards.push(loot[1]); G.cardsWon++; log('A Spirit Card lies inside: '+loot[1]+'.'); SFX.card(); }
 renderAll();
}

/* ============ CONTROL DISPATCH ============ */
function refreshCtl(){
 if(MODE==='title'){ ctlTitle(); return; }
 if(MODE==='gameover'){ rows([btnEl('RETURN TO TITLE',toTitle,'red')]); el('hint').textContent=''; return; }
 if(MODE==='victory'){ rows([btnEl('RETURN TO TITLE',toTitle,'blue')]); el('hint').textContent=''; return; }
 if(MODE==='velvet'){ ctlVelvet(); return; }
 if(MODE==='battle'){ ctlBattle(UI[UI.length-1]||{t:'main'}); return; }
 var top=UI[UI.length-1];
 if(!top){ ctlDpad(); return; }
 if(top.t==='menu') ctlMenu();
 else if(top.t==='items') ctlItems(top);
 else if(top.t==='itarget') ctlItemTarget(top);
 else if(top.t==='mchar') ctlMasqChar(top);
 else if(top.t==='mpick') ctlMasqPick(top);
 else if(top.t==='cards') ctlCards();
 else if(top.t==='stats') ctlStats(top);
 else ctlDpad();
}
function ctlDpad(){
 var act=tileAction();
 rows(
  [ btnEl('\u25c0 TURN',function(){turn(-1);}), btnEl('\u25b2 FORWARD',function(){move(1);}), btnEl('TURN \u25b6',function(){turn(1);}) ],
  [ btnEl('MENU',openMenu),
    btnEl('\u25bc BACK',function(){move(-1);}),
    act ? btnEl(act.label,act.fn,act.cls) : btnEl('\u2014',function(){},'dis') ]
 );
 el('hint').textContent='arrows / WASD move \u00b7 Enter interact \u00b7 M menu';
}
function openMenu(){ UI.push({t:'menu'}); SFX.sel(); renderAll(); }
function popUI(){ UI.pop(); SFX.back(); renderAll(); }
function ctlMenu(){
 rows(
  [ btnEl('ITEMS',function(){UI.push({t:'items',ctx:'field'});SFX.sel();renderAll();}),
    btnEl('MASQUES',function(){UI.push({t:'mchar',ctx:'field'});SFX.sel();renderAll();}) ],
  [ btnEl('STATS',function(){UI.push({t:'stats'});SFX.sel();renderAll();}),
    btnEl('CARDS ('+G.cards.length+')',function(){UI.push({t:'cards'});SFX.sel();renderAll();}) ],
  [ btnEl('OBOLS: '+G.coins,function(){},'dis') ],
  [ btnEl('SAVE',function(){saveGame();}), btnEl('LOAD',function(){loadGame();}) ],
  [ btnEl(MUTED?'SOUND: OFF':'SOUND: ON',toggleSound),
    btnEl('\u2716 CLOSE',popUI,'red') ]
 );
 el('hint').textContent='';
}
function toggleSound(){
 MUTED=!MUTED;
 if(MUTED) drone(false); else if(G&&MODE==='explore') drone(true);
 SFX.sel(); renderAll();
}
function itemBtnLabel(name){ return name+'  \u00d7'+(G.inv[name]||0); }
function ctlItems(top){
 var names=['Medicine','Lunar Dew','Revive Charm'];
 var rws=[];
 for(var i=0;i<names.length;i++){
  (function(nm){
   var have=(G.inv[nm]||0);
   rws.push([ btnEl(itemBtnLabel(nm)+'   \u2014 '+ITEMS[nm].desc, function(){
     if(have<=0){ log('You have no '+nm+'.'); return; }
     UI.push({t:'itarget',item:nm,ctx:top.ctx}); SFX.sel(); renderAll();
   }, have<=0?'small dis2':'small') ]);

/* ---- round resolution ---- */
function resolveRound(){
 B.running=true; UI=[]; renderAll();
 for(var i=0;i<G.party.length;i++) G.party[i].guard=false;
 var actors=[];
 for(var j=0;j<B.cmds.length;j++){
  var cm=B.cmds[j];
  if(cm.actor && cm.actor.hp>0) actors.push({who:cm.actor,cmd:cm,spd:stat(cm.actor,'agi')+rnd(6),side:'p'});
 }
 var foes=aliveFoes();
 for(var k=0;k<foes.length;k++){
  actors.push({who:foes[k],cmd:{kind:'enemy'},spd:foes[k].agi+rnd(6),side:'e'});
 }
 actors.sort(function(a,b){return b.spd-a.spd;});
 var qi=0;
 function step(){
  if(checkEnd()){ finishRound(); return; }
  if(qi>=actors.length){ finishRound(); return; }
  var a=actors[qi++];
  var acted=false;
  if(a.side==='p'){ if(a.who.hp>0){ acted=doPlayer(a.who,a.cmd); } }
  else { if(!a.who.gone){ acted=doEnemy(a.who); } }
  if(B&&B.fled){ return; }
  renderAll();
  setTimeout(step, acted?720:70);
 }
 step();
}
function finishRound(){
 if(!B){ return; }
 B.cmds=[]; B.ci=0; B.running=false; UI=[{t:'main'}];
 if(checkEnd()) return;
 renderAll();
}
function doPlayer(c,cmd){
 if(cmd.kind==='guard'){ c.guard=true; log(c.name+' takes a guarded stance.'); return true; }
 if(cmd.kind==='run'){
  var maxFA=0, fs=aliveFoes();
  for(var i=0;i<fs.length;i++) maxFA=Math.max(maxFA,fs[i].agi);
  var chance=Math.min(0.9,Math.max(0.25,0.55+(stat(c,'agi')-maxFA)*0.03));
  if(B.boss){ log('There is no running from the Gate.'); return true; }
  if(Math.random()<chance){ log('You break away into the dark!'); B.fled=true; endBattle(false); return true; }
  log(c.name+' tries to flee \u2014 but the way closes.'); return true;
 }
 if(cmd.kind==='item'){
  if((G.inv[cmd.item]||0)<=0){ log('The '+cmd.item+' is already spent.'); return true; }
  G.inv[cmd.item]--; applyItem(cmd.item,cmd.target); SFX.heal();
  log(c.name+' uses '+cmd.item+' on '+cmd.target.name+'.'); return true;
 }
 if(cmd.kind==='attack'){
  var fo=cmd.target.gone?pickAliveFoe():cmd.target;
  if(!fo){ return true; }
  var dmg=stat(c,'str')*2+rnd(6)-fo.def;
  if(dmg<1) dmg=1;
  log(c.name+' strikes '+fo.tag+'.');
  hitFoe(fo,dmg,'phys'); return true;
 }
 if(cmd.kind==='skill'){
  var s=SKILLS[cmd.skill];
  if(c.sp<s.cost){ log(c.name+' lacks the SP for '+cmd.skill+'.'); return true; }
  c.sp-=s.cost;
  if(s.type==='heal'){
   if(s.targ==='allies'){
    for(var p=0;p<G.party.length;p++){ var al=G.party[p]; if(al.hp>0) al.hp=Math.min(maxHp(al),al.hp+s.pow); }
    log(c.name+' calls '+cmd.skill+' \u2014 the party mends.'); SFX.heal();
   } else {
    var t=cmd.target; if(t.hp>0){ t.hp=Math.min(maxHp(t),t.hp+s.pow); log(c.name+' mends '+t.name+' (+'+s.pow+').'); SFX.heal(); }
   }
   return true;
  }
  if(s.type==='revive'){
   var tr=cmd.target;
   if(tr.hp<=0){ tr.hp=maxHp(tr); log(c.name+' calls '+cmd.skill+' \u2014 '+tr.name+' rises, whole.'); SFX.heal(); }
   return true;
  }
  // damage
  if(s.targ==='all'){
   log(c.name+' unleashes '+cmd.skill+'!');
   var living=aliveFoes();
   for(var f=0;f<living.length;f++){
    var raw=s.pow+Math.round(stat(c,'mag')*1.6)-Math.round(living[f].def*0.6);
    if(raw<1) raw=1; hitFoe(living[f],raw,s.elem);
   }
  } else {
   var fo2=cmd.target.gone?pickAliveFoe():cmd.target;
   if(!fo2){ return true; }
   var raw2=s.pow+Math.round(stat(c,'mag')*1.6)-Math.round(fo2.def*0.6);
   if(raw2<1) raw2=1;
   log(c.name+' casts '+cmd.skill+' at '+fo2.tag+'.');
   hitFoe(fo2,raw2,s.elem);
  }
  return true;
 }
 if(cmd.kind==='contact'){ return doContact(c,cmd.act,cmd.target); }
 return true;
}
function pickAliveFoe(){ var a=aliveFoes(); return a.length?a[rnd(a.length)]:null; }
function hitFoe(fo,dmg,elem){
 var mult=1, tag='';
 if(ASPECTS[fo.sp].weak.indexOf(elem)>=0){ mult=2; tag=' WEAK!'; }
 else if(ASPECTS[fo.sp].res.indexOf(elem)>=0){ mult=0.5; tag=' (resisted)'; }
 var final=Math.max(1,Math.round(dmg*mult));
 fo.hp-=final; fo.flash=1;
 if(mult===2) SFX.weak(); else SFX.hit();
 log('\u2192 '+final+' damage to '+fo.tag+'.'+tag);
 if(fo.hp<=0){ fo.gone=true; fo.reason='killed'; log(fo.sp+' ('+fo.tag+') is destroyed.'); SFX.die(); }
}
function doContact(c,act,fo){
 if(fo.gone||fo.berserk){ return true; }
 if(Math.random()<0.2){ log(c.name+' '+CLBL[act].toLowerCase()+'s\u2026 the '+fo.sp+' stares through it. No effect.'); return true; }
 var pers=ASPECTS[fo.sp].pers;
 var r=REACT[pers][act];
 var emo=r[0], amt=r[1];
 fo.emo[emo]=(fo.emo[emo]||0)+amt;
 var flavor={
  eager:['leans in, eyes bright.','sways, delighted.','tilts its head, intrigued.'],
  happy:['softens, pleased.','chuckles low.','warms to you.'],
  scared:['shrinks back.','trembles.','eyes the exit.'],
  angry:['bristles.','snarls.','darkens with rage.']
 };
 var fl=flavor[emo][rnd(3)];
 log('The '+fo.sp+' '+fl);
 if(fo.emo.eager>=3){
  fo.gone=true; fo.reason='card';
  G.cards.push(fo.sp); G.cardsWon++;
  log(fo.sp+' offers up its Spirit Card! It fades with a smile.'); SFX.card();
 } else if(fo.emo.happy>=3){
  fo.gone=true; fo.reason='gift';
  var gift=fo.lv*8; G.coins+=gift;
  log(fo.sp+' presses '+gift+' obols into your hands and slips away.'); SFX.card();
 } else if(fo.emo.scared>=3){
  fo.gone=true; fo.reason='fled';
  log(fo.sp+' loses its nerve and flees into the dark.');
 } else if(fo.emo.angry>=3){
  fo.berserk=true;
  log(fo.sp+' snaps \u2014 it goes BERSERK, beyond all words!');
 }
 return true;
}
function doEnemy(fo){
 var living=livingParty();
 if(living.length===0) return true;
 if(fo.boss && Math.random()<0.45){
  log('Moon Sovereign gathers the dark \u2014 LUNAR RAY sweeps the party!');
  for(var i=0;i<living.length;i++) hitChar(living[i], 10+fo.lv, null, true);
  return true;
 }
 var t=living[rnd(living.length)];
 var elem=null, pow;
 if(Math.random()<0.4){ elem=ASPECTS[fo.sp].elem; }
 var base=fo.atk*(fo.berserk?1.6:1)*(G.moon===4?1.2:1);
 pow=Math.round(base*2)+rnd(5);
 log(fo.sp+' ('+fo.tag+') lunges at '+t.name+'.');
 hitChar(t,pow,elem,false);
 return true;
}
function hitChar(c,dmg,elem,noAffin){
 var mult=1, tag='';
 if(!noAffin && elem){
  if(mq(c).weak.indexOf(elem)>=0){ mult=2; tag=' WEAK!'; }
  else if(mq(c).res.indexOf(elem)>=0){ mult=0.5; tag=' (resisted)'; }
 }
 var final=Math.round(dmg*mult - charDef(c)*0.5);
 if(c.guard) final=Math.round(final*0.5);
 if(final<1) final=1;
 c.hp-=final; SFX.hit();
 log('\u2192 '+c.name+' takes '+final+(elem?' '+ELN[elem]:'')+' damage.'+tag);
 if(c.hp<=0){ c.hp=0; log(c.name+' collapses!'); SFX.die(); }
}

/* ---- battle end ---- */
function checkEnd(){
 if(!B) return true;
 if(livingParty().length===0){ gameOver(); return true; }
 if(aliveFoes().length===0){ endBattle(true); return true; }
 return false;
}
function endBattle(won){
 if(!B) return;
 var wasBoss=B.boss;
 if(won){
  var xp=0, coins=0;
  for(var i=0;i<B.foes.length;i++){
   var fo=B.foes[i];
   if(fo.reason==='killed'){ xp+=fo.lv*9; coins+=fo.lv*6+rnd(6); }
   else if(fo.reason==='card'||fo.reason==='gift'){ xp+=Math.ceil(fo.lv*4.5); }
  }
  if(coins>0) G.coins+=coins;
  if(xp>0) log('The party gains '+xp+' XP'+(coins>0?' and '+coins+' obols.':'.'));
  grantXp(xp);
 }
 B=null; MODE='explore'; UI=[];
 if(!MUTED) drone(true);
 if(won && wasBoss){ G.bossDead=true; victory(); return; }
 renderAll();
}
function grantXp(xp){
 if(xp<=0) return;
 for(var i=0;i<G.party.length;i++){
  var c=G.party[i]; if(c.hp<=0) continue;
  c.xp+=xp;
  while(c.xp>=c.lv*24){
   c.xp-=c.lv*24; c.lv++;
   c.maxhp+=6; c.maxsp+=3;
   c.str+=(c.lv%2===0?2:1); c.mag+=1; c.agi+=1;
   c.hp=Math.min(maxHp(c),c.hp+10); c.sp=Math.min(maxSp(c),c.sp+5);
   log('\u2605 '+c.name+' reaches level '+c.lv+'!');
   SFX.heal();
  }
 }
}

/* ---- battle start ---- */
function randomPack(){
 var pool=POOLS[G.floor];
 var min = G.floor===0?1:2;
 var max = G.floor===0?2:3;
 var n=min+rnd(max-min+1);
 var picks=[];
 for(var i=0;i<n;i++) picks.push(pool[rnd(pool.length)]);
 return picks;
}
function makeFoe(name,i){
 var d=ASPECTS[name];
 return {sp:name,tag:String.fromCharCode(65+i),lv:d.lv,hp:d.hp,maxhp:d.hp,
  atk:d.atk,def:d.def,agi:d.agi,
  emo:{eager:0,happy:0,scared:0,angry:0},
  gone:false,berserk:false,flash:0,boss:!!d.boss,reason:null};
}
function startBattle(){
 drone(false);
 var names=randomPack();
 B={foes:[],cmds:[],ci:0,running:false,boss:false,fled:false};
 for(var i=0;i<names.length;i++) B.foes.push(makeFoe(names[i],i));
 MODE='battle'; UI=[{t:'main'}]; LOGS=[];
 var label = names.length>1 ? names.join(', ') : names[0];
 log('Shapes rise from the dark: '+label+'.');
 renderAll();
}
function bossIntro(){
 drone(false);
 B={foes:[makeFoe('Moon Sovereign',0)],cmds:[],ci:0,running:false,boss:true,fled:false};
 MODE='battle'; UI=[{t:'main'}]; LOGS=[];
 log('The gate breathes. A voice like frost: "LITTLE MASKS. YOU CAME."');
 renderAll();
}

/* ============ TITLE / END ============ */
function ctlTitle(){
 rows(
  [ btnEl('NEW GAME',startNew,'red') ],
  [ btnEl('LOAD GAME',loadGame,'blue') ],
  [ btnEl(MUTED?'SOUND: OFF':'SOUND: ON',toggleSound) ]
 );
 el('hint').textContent='Contact aspects to win cards \u2014 but not under a full moon.';
}
function startNew(){
 G=freshGame(); B=null; MODE='explore'; UI=[]; LOGS=[];
 markExplored(); if(!MUTED) drone(true);
 log('You wake at the mouth of the catacombs. Three masks, one moon.');
 log('Tip: weaken an aspect, then CONTACT it \u2014 win its card, fuse masques at the Azure Room \u9580.');
 renderAll();
}
function toTitle(){ MODE='title'; UI=[]; B=null; drone(false); LOGS=[]; renderAll(); }
function gameOver(){ B=null; MODE='gameover'; UI=[]; drone(false); SFX.die(); renderAll(); }
function victory(){ MODE='victory'; UI=[]; drone(false); SFX.card(); renderAll(); }

/* ============ KEYBOARD ============ */
document.addEventListener('keydown',function(e){
 var k=e.key.toLowerCase();
 if(MODE==='explore' && UI.length===0){
  if(k==='arrowup'||k==='w'){ move(1); e.preventDefault(); }
  else if(k==='arrowdown'||k==='s'){ move(-1); e.preventDefault(); }
  else if(k==='arrowleft'||k==='a'){ turn(-1); e.preventDefault(); }
  else if(k==='arrowright'||k==='d'){ turn(1); e.preventDefault(); }
  else if(k==='enter'||k==='e'){ var a=tileAction(); if(a){ a.fn(); } e.preventDefault(); }
  else if(k==='m'){ openMenu(); e.preventDefault(); }
 } else if(k==='escape'){
  if(!(B&&B.running) && UI.length>0){ UI.pop(); SFX.back(); renderAll(); e.preventDefault(); }
 }
});

/* ============ BOOT ============ */
loop(0);
renderAll();

</script>
