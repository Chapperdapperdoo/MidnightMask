<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#06070d">
<title>MIDNIGHT MASQUE</title>
<style>
:root{
  --void:#06070d; --panel:#0b0e18; --line:#232a42;
  --wire:#8fb0d8; --ink:#e8e4da; --dim:#7a8199;
  --blood:#d43148; --gold:#d8b45a; --spc:#4f8fd0;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--void);color:var(--ink);
  font-family:Georgia,'Times New Roman',serif; min-height:100%;}
#wrap{max-width:520px;margin:0 auto;padding:8px;display:flex;flex-direction:column;gap:8px;}
#cv{width:100%;display:block;background:#000;border:1px solid var(--line);border-radius:4px;}
#hud{display:flex;flex-direction:column;gap:4px;font-size:12px;
  font-family:ui-monospace,Menlo,Consolas,monospace;}
.crow{display:flex;align-items:center;gap:6px;background:var(--panel);
  border:1px solid var(--line);border-radius:3px;padding:4px 8px;}
.crow.dead{opacity:.45;}
.cname{width:46px;letter-spacing:1px;}
.clv{width:30px;color:var(--dim);}
.bar{flex:1;height:8px;background:#141827;border-radius:2px;overflow:hidden;}
.bar i{display:block;height:100%;transition:width .3s;}
.hp i{background:linear-gradient(90deg,#8a1f2e,var(--blood));}
.sp i{background:linear-gradient(90deg,#274a74,var(--spc));}
.bnum{width:56px;text-align:right;color:var(--dim);}
.sbar{display:flex;align-items:center;gap:6px;padding:2px 0;}
.sbar .lbl{width:30px;color:var(--dim);font-size:11px;letter-spacing:.5px;}
.sbar .val{width:24px;text-align:right;color:var(--dim);font-size:11px;}
.sbar.str i{background:linear-gradient(90deg,#8a1f2e,var(--blood));}
.sbar.mag i{background:linear-gradient(90deg,#3d2266,#9a6ad8);}
.sbar.agi i{background:linear-gradient(90deg,#1f6a4a,#57d0a0);}
.sbar.def i{background:linear-gradient(90deg,#274a74,var(--spc));}
.sbar.dex i{background:linear-gradient(90deg,#6a5218,var(--gold));}
#log{background:var(--panel);border:1px solid var(--line);border-radius:3px;
  min-height:70px;padding:6px 10px;font-size:13px;line-height:1.45;}
#log .l0{color:var(--ink);}
#log .old{color:var(--dim);}
#ctl{display:flex;flex-direction:column;gap:6px;}
.row{display:flex;gap:6px;}
button{flex:1;background:#10141f;color:var(--ink);border:1px solid var(--line);
  border-radius:4px;padding:12px 6px;font-family:inherit;font-size:14px;
  letter-spacing:1px;cursor:pointer;min-height:46px;
  touch-action:manipulation;user-select:none;-webkit-user-select:none;}
button:active{background:#1a2133;}
button:focus-visible{outline:2px solid var(--wire);outline-offset:1px;}
button.red{border-color:#5c2430;color:#f0b7bd;background:#1a0d12;}
button.blue{border-color:#28407a;color:#b9cdf0;background:#0d1226;}
button.dis{opacity:.35;pointer-events:none;}
button.dis2{opacity:.45;}
button.small{min-height:40px;padding:8px 6px;font-size:12.5px;letter-spacing:.4px;text-align:left;padding-left:12px;}
button.ephys{border-color:#5c5636;color:#d8cfa0;background:#15130a;}
button.efire{border-color:#7a3520;color:#ffb08a;background:#1a0d0a;}
button.eice{border-color:#234a66;color:#9fe0ff;background:#0a1620;}
button.eelec{border-color:#6a5a1a;color:#f0e08a;background:#1a1608;}
button.ewind{border-color:#1f6a4a;color:#9be8c0;background:#0a1810;}
button.dpad{text-align:center;padding-left:6px;font-size:18px;min-height:44px;}
button.dpad.ctr{font-size:11px;letter-spacing:.4px;}
button.ghost{visibility:hidden;pointer-events:none;}
.hint{font-size:11px;color:var(--dim);text-align:center;letter-spacing:1px;min-height:14px;padding-bottom:10px;}
</style>
</head>

var MAZE_W=13, MAZE_H=13;
function bfsDist(g,sx,sy){
 var dist={}; dist[sy+','+sx]=0;
 var queue=[[sx,sy]], qi=0;
 while(qi<queue.length){
  var cur=queue[qi++], cx=cur[0], cy=cur[1], cd=dist[cy+','+cx];
  var nbrs=[[cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]];
  for(var n=0;n<4;n++){
   var nx=nbrs[n][0], ny=nbrs[n][1];
   if(g[ny] && g[ny][nx]==='.' && dist[ny+','+nx]===undefined){
    dist[ny+','+nx]=cd+1; queue.push([nx,ny]);
   }
  }
 }
 return dist;
}
function genFloorMap(isLast){
 var w=MAZE_W, h=MAZE_H, g=[];
 for(var y=0;y<h;y++){ var row=[]; for(var x=0;x<w;x++) row.push('#'); g.push(row); }
 (function carve(cx,cy){
  g[cy][cx]='.';
  var dirs=[[0,-2],[0,2],[-2,0],[2,0]];
  for(var i=dirs.length-1;i>0;i--){ var j=rnd(i+1); var tmp=dirs[i]; dirs[i]=dirs[j]; dirs[j]=tmp; }
  for(var d=0;d<dirs.length;d++){
   var nx=cx+dirs[d][0], ny=cy+dirs[d][1];
   if(nx>0&&nx<w-1&&ny>0&&ny<h-1&&g[ny][nx]==='#'){
    g[cy+dirs[d][1]/2][cx+dirs[d][0]/2]='.';
    carve(nx,ny);
   }
  }
 })(1,1);
 for(var by=1;by<h-1;by++){
  for(var bx=1;bx<w-1;bx++){
   if(g[by][bx]!=='#' || Math.random()>=0.12) continue;
   if(bx%2===0 && by%2===1 && g[by][bx-1]==='.' && g[by][bx+1]==='.') g[by][bx]='.';
   else if(by%2===0 && bx%2===1 && g[by-1][bx]==='.' && g[by+1][bx]==='.') g[by][bx]='.';
  }
 }
 var dist=bfsDist(g,1,1);
 var allCells=[], deadSet={};
 for(var yy=1;yy<h-1;yy++) for(var xx=1;xx<w-1;xx++){
  if(g[yy][xx]==='.' && !(xx===1&&yy===1)){
   allCells.push([xx,yy]);
   var deg=0;
   if(g[yy-1][xx]==='.') deg++;
   if(g[yy+1][xx]==='.') deg++;
   if(g[yy][xx-1]==='.') deg++;
   if(g[yy][xx+1]==='.') deg++;
   if(deg<=1) deadSet[xx+','+yy]=true;
  }
 }
 allCells.sort(function(a,b){ return dist[b[1]+','+b[0]]-dist[a[1]+','+a[0]]; });
 g[1][1]='S';
 var farthest=allCells.shift();
 if(farthest) g[farthest[1]][farthest[0]]=isLast?'B':'>';
 var deadPool=[], otherPool=[];
 for(var ac=0;ac<allCells.length;ac++){
  (deadSet[allCells[ac][0]+','+allCells[ac][1]] ? deadPool : otherPool).push(allCells[ac]);
 }
 function shuffle(arr){ for(var i=arr.length-1;i>0;i--){ var j=rnd(i+1); var tmp=arr[i]; arr[i]=arr[j]; arr[j]=tmp; } return arr; }
 var rest=shuffle(deadPool).concat(shuffle(otherPool));
 if(rest.length){ var v=rest.shift(); g[v[1]][v[0]]='V'; }
 if(rest.length){ var hh=rest.shift(); g[hh[1]][hh[0]]='H'; }
 var chestCount=2+rnd(2);
 for(var c=0;c<chestCount && rest.length;c++){ var t=rest.shift(); g[t[1]][t[0]]='T'; }
 var out=[];
 for(var r=0;r<h;r++) out.push(g[r].join(''));
 return out;
}
function genDungeon(){
 var floors=[];
 for(var i=0;i<FLOOR_NAMES.length;i++) floors.push(genFloorMap(i===FLOOR_NAMES.length-1));
 return floors;
}

function rollLoot(){
 var total=0; for(var i=0;i<LOOT_TABLE.length;i++) total+=LOOT_TABLE[i].w;
 var r=Math.random()*total, acc=0, pick=LOOT_TABLE[0];
 for(var j=0;j<LOOT_TABLE.length;j++){ acc+=LOOT_TABLE[j].w; if(r<acc){ pick=LOOT_TABLE[j]; break; } }
 var mult=1+G.floor*0.6;
 if(pick.kind==='coins') return {kind:'coins',amount:Math.round((40+rnd(60))*mult)};
 if(pick.kind==='item') return {kind:'item',name:pick.name,qty:pick.name==='Revive Charm'?1:(1+rnd(2))};

 return {kind:'card',name:pool[rnd(pool.length)]};
}

/* ============ PIXEL ART ============ */
/* SNES-style sprites: mirrored silhouettes + a dark 1px outline pass +
   a two-tone shade split (light from the right), like SMT If...'s portraits. */
function mirrorH(half){ return half+half.slice(0,-1).split('').reverse().join(''); }
function pxFillRow(n,w,ch,base){
 var r=(base||'').split(''); if(!r.length){for(var i=0;i<w;i++) r.push('.');}
 for(var col=w-n; col<w; col++) r[col]=ch;
 return r.join('');
}
function pxSetCh(rows,r,c,ch){ var a=rows[r].split(''); a[c]=ch; rows[r]=a.join(''); }
function pxOutline(rows,ch){
 var h=rows.length, w=rows[0].length, i,j;
 var grid=rows.map(function(r){return r.split('');});
 var out=rows.map(function(r){return r.split('');});
 for(i=0;i<h;i++){
  for(j=0;j<w;j++){
   if(grid[i][j]!=='.') continue;
   var n=(i>0&&grid[i-1][j]!=='.')||(i<h-1&&grid[i+1][j]!=='.')||(j>0&&grid[i][j-1]!=='.')||(j<w-1&&grid[i][j+1]!=='.');
   if(n) out[i][j]=ch;
  }
 }
 return out.map(function(a){return a.join('');});
}
function pxShadeLeft(rows,darkMap){
 var w=rows[0].length, center=Math.floor(w/2);
 return rows.map(function(row){
  var a=row.split('');
  for(var c=0;c<center;c++){ if(darkMap[a[c]]) a[c]=darkMap[a[c]]; }
  return a.join('');
 });
}
function finishSprite(rows,darkMap,outlineCh){ return pxOutline(pxShadeLeft(rows,darkMap),outlineCh); }
var TILE_ICONS={
 'V':{glow:'#6a8dff',pal:{F:'#7d9dff',f:'#40509a',W:'#6a4528',w:'#8a6038',x:'#3a2415',G:'#f0c860',X:'#050608'},half:[
  '..FFFF','.FFWWW','FFWWwW','FWWWwW','FWWWwW','FWWWwW','FWWWwW','FWWWwW','FWWWwW','FWWWwW','FFFFFF'
 ],dark:{F:'f',W:'x',w:'x'}},
 'H':{glow:'#57d0a0',pal:{R:'#5c6a80',r:'#333d4a',W:'#57d0a0',w:'#8be8c8',z:'#357a5c',X:'#040a08'},half:[

 ],dark:{R:'r',W:'z',w:'z'}},
 'T':{glow:'#d8b45a',pal:{B:'#7a5228',b:'#c98f42',M:'#dfe7f7',G:'#f0c860',d:'#4a2e14',e:'#8a5e28',y:'#8a97b8',X:'#0a0602'},half:[
  '......','.BBBBB','BBBBBB','BMMMMM','Bbbbbb','BbGbbb','Bbbbbb','Bbbbbb','BMMMMM','BBBBBB','......'
 ],dark:{B:'d',b:'e',M:'y'}},
 'B':{glow:'#e0364a',pal:{G:'#4a1420',g:'#9a2030',d:'#220a0e',e:'#5a1620',X:'#020204'},half:[
  '.G.G.G','GGGGGG','GgGgGg','GGGGGG','GgGgGg','GGGGGG','GgGgGg','GGGGGG','GgGgGg','GGGGGG','.G.G.G'
 ],dark:{G:'d',g:'e'}},
 '>':{glow:'#c9d4ee',pal:{S:'#dfe7f7',z:'#8a97b8',X:'#04060a'},half:[
  '......','.....S','....SS','...SSS','..SSSS','.SSSSS','SSSSSS','......','......','......','......'
 ],dark:{S:'z'}}
};
(function(){
 for(var k in TILE_ICONS){
  var icon=TILE_ICONS[k];
  icon.rows=finishSprite(icon.half.map(mirrorH), icon.dark, 'X');
 }
})();
/* Vector busts: anime-style academy portraits drawn with arcs/bezier
   curves rather than a pixel grid. Each entry supplies colors plus a
   bangs() callback that draws that character's hair silhouette. */
function bustShape(path,fill,outline){
 CTX.beginPath(); path(); CTX.closePath();
 CTX.fillStyle=fill; CTX.fill();
 CTX.lineWidth=1.6; CTX.strokeStyle=outline; CTX.stroke();
}
function drawVectorBust(cx,cy,s,spec){
 CTX.save();
 CTX.translate(cx,cy); CTX.scale(s,s);
 CTX.lineJoin='round'; CTX.lineCap='round';
 var ol=spec.outline;
 bustShape(function(){ CTX.ellipse(0,-6,27,30,0,0,Math.PI*2); }, spec.hair, ol);
 bustShape(function(){
  CTX.moveTo(-42,74); CTX.lineTo(-34,34);
  CTX.quadraticCurveTo(-20,42,-7,40); CTX.lineTo(0,58); CTX.lineTo(7,40);
  CTX.quadraticCurveTo(20,42,34,34); CTX.lineTo(42,74); CTX.lineTo(-42,74);
 }, spec.uniform, ol);
 bustShape(function(){ CTX.moveTo(-7,40); CTX.lineTo(0,28); CTX.lineTo(7,40); CTX.lineTo(0,58); }, '#eef1f6', ol);
 bustShape(function(){ CTX.moveTo(-3,40); CTX.lineTo(3,40); CTX.lineTo(2,58); CTX.lineTo(-2,58); }, spec.tie, ol);
 bustShape(function(){ CTX.moveTo(-8,18); CTX.lineTo(8,18); CTX.lineTo(10,34); CTX.lineTo(-10,34); }, spec.skin, ol);
 bustShape(function(){ CTX.ellipse(0,-6,20,24,0,0,Math.PI*2); }, spec.skin, ol);
 spec.bangs(spec.hair,ol);
 CTX.strokeStyle=ol; CTX.lineWidth=2;
 [-9,9].forEach(function(dx){
  CTX.beginPath(); CTX.moveTo(dx-4,-11); CTX.quadraticCurveTo(dx,-14,dx+4,-11); CTX.stroke();
 });
 [-9,9].forEach(function(dx){
  CTX.beginPath();
  CTX.moveTo(dx-5,-2); CTX.quadraticCurveTo(dx,-9,dx+5,-2); CTX.quadraticCurveTo(dx,1,dx-5,-2); CTX.closePath();
  CTX.fillStyle='#fff'; CTX.fill(); CTX.lineWidth=1.2; CTX.strokeStyle=ol; CTX.stroke();
  CTX.beginPath(); CTX.arc(dx,-4.5,3,0,Math.PI*2); CTX.fillStyle=spec.eye; CTX.fill();
  CTX.beginPath(); CTX.arc(dx,-4.5,1.3,0,Math.PI*2); CTX.fillStyle='#140905'; CTX.fill();
  CTX.beginPath(); CTX.arc(dx-1,-5.5,0.7,0,Math.PI*2); CTX.fillStyle='#fff'; CTX.fill();
 });
 CTX.beginPath(); CTX.moveTo(-3,11); CTX.quadraticCurveTo(0,13,3,11);
 CTX.lineWidth=1.3; CTX.strokeStyle=spec.mouth; CTX.stroke();
 CTX.save();
 CTX.beginPath(); CTX.ellipse(0,-6,20,24,0,0,Math.PI*2); CTX.clip();

function beep(f,d,type,g){

 try{
  var o=a.createOscillator(),v=a.createGain();
  o.type=type||'square'; o.frequency.value=f;
  v.gain.setValueAtTime(g||0.035,a.currentTime);
  v.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(d||0.08));

}

/* ============ EXPLORATION ============ */
function turn(s){ if(busy())return; G.dir=(G.dir+s+4)%4; SFX.step(); renderAll(); }
function busy(){ return MODE!=='explore'; }
function move(dz){
 if(busy())return;
 var f=fwd(G.dir);
 var nx=G.x+f[0]*dz, ny=G.y+f[1]*dz;
 if(isWall(nx,ny)){ SFX.back(); return; }
 G.x=nx; G.y=ny; SFX.step(); markExplored(); afterStep();
}
function afterStep(){
 G.steps++;
 G.moonSteps++;
 if(G.moonSteps>=STEPS_PER_PHASE){
  G.moonSteps=0; G.moon=(G.moon+1)%8;
  if(G.moon===4){ log('The FULL MOON rises. The aspects will not listen now \u2014 only fight.'); SFX.moon(); }
  else log('The moon turns to '+MOONS[G.moon]+'.');
 }
 var c=mapAt(G.floor,G.x,G.y);
 if(c==='>') log('Stairs descend into the dark. (interact to go down)');
 else if(c==='V') log('A blue door, humming faintly. (interact to enter the Azure Room)');
 else if(c==='H') log('A still spring glimmers here. (interact to drink)');
 else if(c==='T' && !G.opened[G.floor+':'+G.x+','+G.y]) log('A strongbox rests here. (interact to open)');
 else if(c==='B' && !G.bossDead) log('The air freezes. Something vast waits ahead. (interact to face it)');
 if('SVH>B'.indexOf(c)<0){
  var full=G.moon===4;
  var rate= full?0.1:0.065;
  if(Math.random()<rate) startBattle();
 }
 renderAll();
}
function tileAction(){
 var c=mapAt(G.floor,G.x,G.y);
 if(c==='>') return {label:'\u25b2 DESCEND',fn:descend,cls:''};
 if(c==='V') return {label:'AZURE ROOM',fn:enterVelvet,cls:'blue'};
 if(c==='H') return {label:'DRINK (20 ob)',fn:useSpring,cls:''};
 if(c==='T' && !G.opened[G.floor+':'+G.x+','+G.y]) return {label:'OPEN CHEST',fn:openChest,cls:''};
 if(c==='B' && !G.bossDead) return {label:'FACE THE GATE',fn:bossIntro,cls:'red'};
 return null;
}
function descend(){
 if(G.floor>=G.dungeon.length-1){ log('The stairs are sealed below. Nowhere left to descend.'); return; }
 G.floor++; placeAtStart();
 log('You descend to '+FLOOR_NAMES[G.floor]+'.');
 markExplored(); renderAll();
}
function placeAtStart(){
 var m=G.dungeon[G.floor];
 for(var y=0;y<m.length;y++) for(var x=0;x<m[0].length;x++){
  if(m[y][x]==='S'){ G.x=x; G.y=y; G.dir=isWall(x+1,y)?2:1; return; }
 }
}
function useSpring(){
 if(G.coins<20){ log('The spring wants 20 obols. You have '+G.coins+'.'); return; }
 G.coins-=20;
 for(var i=0;i<G.party.length;i++){
  var c=G.party[i]; if(c.hp>0){ c.hp=maxHp(c); c.sp=maxSp(c); }
 }
 SFX.heal(); log('The living drink deep. HP and SP restored. (\u221220 obols)');
 renderAll();
}
function openChest(){
 var key=G.floor+':'+G.x+','+G.y;
 if(G.opened[key]){ log('Already emptied.'); return; }
 G.opened[key]=true;
 var loot=rollLoot();
 if(loot.kind==='coins'){ G.coins+=loot.amount; log('The strongbox holds '+loot.amount+' obols.'); }
 else if(loot.kind==='item'){ G.inv[loot.name]=(G.inv[loot.name]||0)+loot.qty; log('You find '+loot.qty+'\u00d7 '+loot.name+'.'); }
 else if(loot.kind==='card'){ G.cards.push(loot.name); G.cardsWon++; log('A Spirit Card lies inside: '+loot.name+'.'); SFX.card(); }
 renderAll();
}

/* ============ CONTROL DISPATCH ============ */
function refreshCtl(){
 if(MODE==='intro'){ rows([btnEl('SKIP ▶',function(){MODE='title';SFX.sel();renderAll();})]); el('hint').textContent=''; return; }
 if(MODE==='title'){ ctlTitle(); return; }
 if(MODE==='gameover'){ rows([btnEl('RETURN TO TITLE',toTitle,'red')]); el('hint').textContent=''; return; }
 if(MODE==='victory'){ rows([btnEl('RETURN TO TITLE',toTitle,'blue')]); el('hint').textContent=''; return; }
 if(MODE==='velvet'){ ctlVelvet(); return; }
 if(MODE==='masque'){ ctlMasqueParty(); return; }
 if(MODE==='battle'){ ctlBattle(UI[UI.length-1]||{t:'main'}); return; }
 var top=UI[UI.length-1];
 if(!top){ ctlDpad(); return; }
 if(top.t==='menu') ctlMenu();
 else if(top.t==='items') ctlItems(top);
 else if(top.t==='itarget') ctlItemTarget(top);
 else if(top.t==='mchar') ctlMasqChar(top);
 else if(top.t==='mpick') ctlMasqPick(top);
 else if(top.t==='cards') ctlCards();
 else if(top.t==='stats') ctlStats(top);
 else ctlDpad();

var GRID_W=5, GRID_H=5, GRID_PARTY_COL=1, GRID_FOE_COL=3;
function centeredRows(n){
 if(n<=1) return [2];
 if(n===2) return [1,3];
 return [1,2,3];
}
function inBounds(gx,gy){ return gx>=0&&gx<GRID_W&&gy>=0&&gy<GRID_H; }
function occupantAt(gx,gy,exclude){
 for(var i=0;i<G.party.length;i++){
  var c=G.party[i];
  if(c!==exclude && c.hp>0 && c.gx===gx && c.gy===gy) return c;
 }
 if(B) for(var j=0;j<B.foes.length;j++){
  var fo=B.foes[j];
  if(fo!==exclude && !fo.gone && fo.gx===gx && fo.gy===gy) return fo;
 }
 return null;
}
function gdist(a,b){ return Math.max(Math.abs(a.gx-b.gx),Math.abs(a.gy-b.gy)); }
function isMelee(mode,skillName){
 if(mode==='attack') return true;
 var s=SKILLS[skillName];
 return !!(s && s.elem==='phys');
}
function placeParty(){
 var rows=centeredRows(G.party.length);
 for(var i=0;i<G.party.length;i++){ G.party[i].gx=GRID_PARTY_COL; G.party[i].gy=rows[i]; G.party[i].facing=1; }
}
function placeFoes(){
 var cells=[];
 for(var gx=GRID_PARTY_COL+1;gx<GRID_W;gx++) for(var gy=0;gy<GRID_H;gy++) cells.push([gx,gy]);
 for(var i=cells.length-1;i>0;i--){ var j=rnd(i+1); var tmp=cells[i]; cells[i]=cells[j]; cells[j]=tmp; }
 for(var k=0;k<B.foes.length;k++){ B.foes[k].gx=cells[k][0]; B.foes[k].gy=cells[k][1]; B.foes[k].facing=3; }
}
function dirFromDelta(dx,dy){
 if(dx===0&&dy===-1) return 0;
 if(dx===1&&dy===0) return 1;
 if(dx===0&&dy===1) return 2;
 if(dx===-1&&dy===0) return 3;
 return null;
}
function facingMultiplier(attacker,defender){
 if(defender.facing==null || attacker===defender) return 1;
 var dx=attacker.gx-defender.gx, dy=attacker.gy-defender.gy;
 if(dx===0&&dy===0) return 1;
 var best=-Infinity, bestDir=defender.facing;
 for(var d=0;d<4;d++){
  var v=fwd(d), dot=v[0]*dx+v[1]*dy;
  if(dot>best){ best=dot; bestDir=d; }
 }
 if(bestDir===defender.facing) return 0.75;
 if(bestDir===(defender.facing+2)%4) return 1.5;
 return 1;
}
function moveRange(unit){
 var d=unit.masque?stat(unit,'dex'):unit.dex;
 return Math.max(1,Math.floor((d||0)/5));

 for(var i=0;i<G.party.length;i++){
  (function(c){
   var ok=c.hp<=0;
   rws.push([ btnEl(c.name+'   '+(c.hp<=0?'fallen':'active'), function(){
     if(!ok){ log(c.name+' still stands.'); return; }
     queueCmd({kind:'skill',skill:top.skill,target:c});
   }, ok?'small':'small dis2') ]);
  })(G.party[i]);
 }
 rws.push([ btnEl('\u2716 BACK',function(){UI=[{t:'skill'}];SFX.back();renderAll();},'red') ]);
 rows.apply(null,rws);
 el('hint').textContent='Revive which ally?';
}
function ctlContactTarget(top){
 var foes=aliveFoes(), rws=[];
 for(var i=0;i<foes.length;i++){
  (function(fo){
   var can=!fo.berserk;
   rws.push([ btnEl(fo.tag+'  '+ASPECTS[fo.sp].glyph+' '+fo.sp+'  \u00b7 '+(fo.berserk?'berserk':ASPECTS[fo.sp].pers), function(){
     if(!can){ log(fo.sp+' is berserk \u2014 beyond reason.'); return; }
     UI=[{t:'cact',target:fo}]; SFX.sel(); renderAll();
   }, can?'small':'small dis2') ]);
  })(foes[i]);
 }
 rws.push([ btnEl('\u2716 BACK',function(){UI=[{t:'main'}];SFX.back();renderAll();},'red') ]);
 rows.apply(null,rws);
 el('hint').textContent='Speak to which aspect?';
}
function ctlContactAct(top){
 var c=nextCmdChar();
 rows(
  [ btnEl('PERSUADE',function(){queueCmd({kind:'contact',act:'persuade',target:top.target});}),
    btnEl('JOKE',function(){queueCmd({kind:'contact',act:'joke',target:top.target});}) ],
  [ btnEl('TAUNT',function(){queueCmd({kind:'contact',act:'taunt',target:top.target});}),
    btnEl('PLEAD',function(){queueCmd({kind:'contact',act:'plead',target:top.target});}) ],
  [ btnEl('\u2716 BACK',function(){UI=[{t:'ctarget'}];SFX.back();renderAll();},'red') ]
 );
 el('hint').textContent=c.name+' approaches the '+top.target.sp+'. Reach it before its heart turns.';
}

/* ---- round resolution ---- */
function startRound(){
 if(!B) return;
 for(var i=0;i<G.party.length;i++) G.party[i].guard=false;
 var actors=[];
 for(var p=0;p<G.party.length;p++){ if(G.party[p].hp>0) actors.push({who:G.party[p],side:'p'}); }
 var foes=aliveFoes();
 for(var k=0;k<foes.length;k++){ actors.push({who:foes[k],side:'e'}); }
 for(var a=0;a<actors.length;a++){
  actors[a].spd = actors[a].side==='p' ? stat(actors[a].who,'agi')+rnd(6) : actors[a].who.agi+rnd(6);
 }
 actors.sort(function(x,y){return y.spd-x.spd;});
 B.turnQueue=actors; B.qi=0;
 advanceTurn();
}
function advanceTurn(){
 if(!B) return;
 if(checkEnd()) return;
 if(B.qi>=B.turnQueue.length){ startRound(); return; }
 var a=B.turnQueue[B.qi++];
 if(a.side==='e'){
  if(a.who.gone){ advanceTurn(); return; }
  B.running=true; B.current=null; UI=[{t:'main'}]; renderAll();
  var acted=doEnemy(a.who);
  if(B&&B.fled) return;
  renderAll();
  setTimeout(advanceTurn, acted?720:70);
  return;
 }
 if(a.who.hp<=0){ advanceTurn(); return; }
 B.running=false; B.current=a.who; B.movesLeft=moveRange(a.who); UI=[{t:'main'}]; renderAll();
}
function doPlayer(c,cmd){
 if(cmd.kind==='guard'){ c.guard=true; log(c.name+' takes a guarded stance.'); return true; }
 if(cmd.kind==='move'){
  var nx=c.gx+cmd.dx, ny=c.gy+cmd.dy;
  if(!inBounds(nx,ny) || occupantAt(nx,ny,c)){ log(c.name+' has nowhere to move.'); return true; }
  c.gx=nx; c.gy=ny;
  c.facing=dirFromDelta(cmd.dx,cmd.dy);
  log(c.name+' repositions.');
  return true;
 }
 if(cmd.kind==='run'){
  var maxFA=0, fs=aliveFoes();
  for(var i=0;i<fs.length;i++) maxFA=Math.max(maxFA,fs[i].agi);
  var chance=Math.min(0.9,Math.max(0.25,0.55+(stat(c,'agi')-maxFA)*0.03));
  if(B.boss){ log('There is no running from the Gate.'); return true; }
  if(Math.random()<chance){ log('You break away into the dark!'); B.fled=true; endBattle(false); return true; }
  log(c.name+' tries to flee \u2014 but the way closes.'); return true;
 }
 if(cmd.kind==='item'){
  if((G.inv[cmd.item]||0)<=0){ log('The '+cmd.item+' is already spent.'); return true; }
  G.inv[cmd.item]--; applyItem(cmd.item,cmd.target); SFX.heal();
  log(c.name+' uses '+cmd.item+' on '+cmd.target.name+'.'); return true;
 }
 if(cmd.kind==='attack'){
  var fo=cmd.target.gone?pickAliveFoe():cmd.target;
  if(!fo){ return true; }
  var dmg=stat(c,'str')*2+rnd(6)-fo.def;
  if(dmg<1) dmg=1;
  log(c.name+' strikes '+fo.tag+'.');
  hitFoe(c,fo,dmg,'phys'); return true;
 }
 if(cmd.kind==='skill'){
  var s=SKILLS[cmd.skill];
  if(c.sp<s.cost){ log(c.name+' lacks the SP for '+cmd.skill+'.'); return true; }
  c.sp-=s.cost;
  if(s.type==='heal'){
   if(s.targ==='allies'){
    for(var p=0;p<G.party.length;p++){ var al=G.party[p]; if(al.hp>0) al.hp=Math.min(maxHp(al),al.hp+s.pow); }
    log(c.name+' calls '+cmd.skill+' \u2014 the party mends.'); SFX.heal();
   } else {
    var t=cmd.target; if(t.hp>0){ t.hp=Math.min(maxHp(t),t.hp+s.pow); log(c.name+' mends '+t.name+' (+'+s.pow+').'); SFX.heal(); }
   }
   return true;
  }
  if(s.type==='revive'){
   var tr=cmd.target;
   if(tr.hp<=0){ tr.hp=maxHp(tr); log(c.name+' calls '+cmd.skill+' \u2014 '+tr.name+' rises, whole.'); SFX.heal(); }
   return true;
  }
  // damage
  var anchor=cmd.target.gone?pickAliveFoe():cmd.target;
  if(!anchor){ return true; }
  if(s.area==='col'||s.area==='row'){
   log(c.name+' unleashes '+cmd.skill+'!');
   var af=aliveFoes(), hits=[];
   for(var f=0;f<af.length;f++){
    if(s.area==='col' ? af[f].gx===anchor.gx : af[f].gy===anchor.gy) hits.push(af[f]);
   }
   for(var h=0;h<hits.length;h++){
    var raw=s.pow+Math.round(stat(c,'mag')*1.6)-Math.round(hits[h].def*0.6);
    if(raw<1) raw=1; hitFoe(c,hits[h],raw,s.elem);
   }
  } else {
   var raw2=s.pow+Math.round(stat(c,'mag')*1.6)-Math.round(anchor.def*0.6);
   if(raw2<1) raw2=1;
   log(c.name+' casts '+cmd.skill+' at '+anchor.tag+'.');
   hitFoe(c,anchor,raw2,s.elem);
  }
  return true;
 }
 if(cmd.kind==='contact'){ return doContact(c,cmd.act,cmd.target); }
 return true;
}
function pickAliveFoe(){ var a=aliveFoes(); return a.length?a[rnd(a.length)]:null; }
function hitFoe(attacker,fo,dmg,elem){
 var mult=1, tag='';
 if(ASPECTS[fo.sp].weak.indexOf(elem)>=0){ mult=2; tag=' WEAK!'; }
 else if(ASPECTS[fo.sp].res.indexOf(elem)>=0){ mult=0.5; tag=' (resisted)'; }
 var fm=elem==='phys'?facingMultiplier(attacker,fo):1;
 mult*=fm;
 if(fm===1.5) tag+=' BACKSTAB!'; else if(fm===0.75) tag+=' (blocked front)';
 var final=Math.max(1,Math.round(dmg*mult));
 fo.hp-=final; fo.flash=1;
 if(fm===1.5||mult>=2) SFX.weak(); else SFX.hit();
 log('\u2192 '+final+' damage to '+fo.tag+'.'+tag);
 if(fo.hp<=0){ fo.gone=true; fo.reason='killed'; log(fo.sp+' ('+fo.tag+') is destroyed.'); SFX.die(); }
}
function doContact(c,act,fo){
 if(fo.gone||fo.berserk){ return true; }
 if(Math.random()<0.2){ log(c.name+' '+CLBL[act].toLowerCase()+'s\u2026 the '+fo.sp+' stares through it. No effect.'); return true; }
 var pers=ASPECTS[fo.sp].pers;
 var r=REACT[pers][act];
 var emo=r[0], amt=r[1];
 fo.emo[emo]=(fo.emo[emo]||0)+amt;
 var flavor={
  eager:['leans in, eyes bright.','sways, delighted.','tilts its head, intrigued.'],
  happy:['softens, pleased.','chuckles low.','warms to you.'],
  scared:['shrinks back.','trembles.','eyes the exit.'],
  angry:['bristles.','snarls.','darkens with rage.']
 };
 var fl=flavor[emo][rnd(3)];
 log('The '+fo.sp+' '+fl);
 if(fo.emo.eager>=3){
  fo.gone=true; fo.reason='card';
  G.cards.push(fo.sp); G.cardsWon++;
  log(fo.sp+' offers up its Spirit Card! It fades with a smile.'); SFX.card();
 } else if(fo.emo.happy>=3){
  fo.gone=true; fo.reason='gift';
  var gift=fo.lv*8; G.coins+=gift;
  log(fo.sp+' presses '+gift+' obols into your hands and slips away.'); SFX.card();
 } else if(fo.emo.scared>=3){
  fo.gone=true; fo.reason='fled';
  log(fo.sp+' loses its nerve and flees into the dark.');
 } else if(fo.emo.angry>=3){
  fo.berserk=true;
  log(fo.sp+' snaps \u2014 it goes BERSERK, beyond all words!');
 }
 return true;
}
function stepToward(fo,target){
 var dx=target.gx-fo.gx, dy=target.gy-fo.gy;
 var sx=dx>0?1:dx<0?-1:0, sy=dy>0?1:dy<0?-1:0;
 if(sx!==0 && !occupantAt(fo.gx+sx,fo.gy,fo)){ fo.gx+=sx; fo.facing=dirFromDelta(sx,0); return; }
 if(sy!==0 && !occupantAt(fo.gx,fo.gy+sy,fo)){ fo.gy+=sy; fo.facing=dirFromDelta(0,sy); return; }
}
function preyTarget(living){
 var best=living[0];
 for(var i=1;i<living.length;i++){ if(living[i].hp<best.hp) best=living[i]; }
 return best;
}
function doEnemy(fo){
 var living=livingParty();
 if(living.length===0) return true;
 if(!fo.berserk && fo.hp/fo.maxhp<0.3){
  fo.berserk=true;
  log(fo.sp+' ('+fo.tag+') snarls, cornered and desperate!');
 }
 if(fo.boss && Math.random()<0.55){
  log('Moon Sovereign gathers the dark \u2014 LUNAR RAY sweeps the party!');
  for(var i=0;i<living.length;i++) hitChar(fo, living[i], 10+fo.lv, null, true);
  return true;
 }
 var melee=Math.random()>=0.25;
 var elem=melee?'phys':ASPECTS[fo.sp].elem;
 var prey=preyTarget(living);
 var t;
 if(melee){
  if(gdist(fo,prey)<=1){
   t=prey;
  } else {
   var adjacent=null;
   for(var i2=0;i2<living.length;i2++){ if(gdist(fo,living[i2])<=1){ adjacent=living[i2]; break; } }
   if(adjacent){
    t=adjacent;
   } else {
    var steps=moveRange(fo);
    for(var s=0;s<steps && gdist(fo,prey)>1;s++){ stepToward(fo,prey); }
    if(gdist(fo,prey)>1){
     log(fo.sp+' ('+fo.tag+') closes in.');
     return true;
    }
    t=prey;
   }
  }
 } else {
  t=prey;
 }
 var base=fo.atk*(fo.berserk?1.6:1)*(G.moon===4?1.2:1);
 var pow=Math.round(base*2)+rnd(5);
 log(fo.sp+' ('+fo.tag+') lunges at '+t.name+'.');
 hitChar(fo,t,pow,elem,false);
 return true;
}
function hitChar(attacker,c,dmg,elem,noAffin){
 var mult=1, tag='';
 if(!noAffin && elem){
  if(mq(c).weak.indexOf(elem)>=0){ mult=2; tag=' WEAK!'; }
  else if(mq(c).res.indexOf(elem)>=0){ mult=0.5; tag=' (resisted)'; }
 }
 var fm=elem==='phys'?facingMultiplier(attacker,c):1;
 mult*=fm;
 if(fm===1.5) tag+=' BACKSTAB!'; else if(fm===0.75) tag+=' (blocked front)';
 var final=Math.round(dmg*mult - charDef(c)*0.5);
 if(c.guard) final=Math.round(final*0.5);
 if(final<1) final=1;
 c.hp-=final; SFX.hit();
 log('\u2192 '+c.name+' takes '+final+(elem?' '+ELN[elem]:'')+' damage.'+tag);
 if(c.hp<=0){ c.hp=0; log(c.name+' collapses!'); SFX.die(); }
}

/* ---- battle end ---- */
function checkEnd(){
 if(!B) return true;
 if(livingParty().length===0){ gameOver(); return true; }
 if(aliveFoes().length===0){ endBattle(true); return true; }
 return false;
}
function endBattle(won){
 if(!B) return;
 var wasBoss=B.boss;
 if(won){
  var xp=0, coins=0;
  for(var i=0;i<B.foes.length;i++){
   var fo=B.foes[i];
   if(fo.reason==='killed'){ xp+=fo.lv*9; coins+=fo.lv*6+rnd(6); }
   else if(fo.reason==='card'||fo.reason==='gift'){ xp+=Math.ceil(fo.lv*4.5); }
  }
  if(coins>0) G.coins+=coins;
  if(xp>0) log('The party gains '+xp+' XP'+(coins>0?' and '+coins+' obols.':'.'));
  grantXp(xp);
 }
 B=null; MODE='explore'; UI=[];
 if(!MUTED) drone(true);
 if(won && wasBoss){ G.bossDead=true; victory(); return; }
 renderAll();
}
function grantXp(xp){
 if(xp<=0) return;
 for(var i=0;i<G.party.length;i++){
  var c=G.party[i]; if(c.hp<=0) continue;
  c.xp+=xp;
  while(c.xp>=c.lv*24){
   c.xp-=c.lv*24; c.lv++;
   c.maxhp+=6; c.maxsp+=3;
   c.str+=(c.lv%2===0?2:1); c.mag+=1; c.agi+=1; c.dex+=1;
   c.hp=Math.min(maxHp(c),c.hp+10); c.sp=Math.min(maxSp(c),c.sp+5);
   log('\u2605 '+c.name+' reaches level '+c.lv+'!');
   SFX.heal();
  }
 }
}

/* ---- battle start ---- */
function randomPack(){
 var pool=POOLS[G.floor];
 var min = G.floor===0?1:2;
 var max = G.floor===0?2:3;
 var n=min+rnd(max-min+1);
 var picks=[];
 for(var i=0;i<n;i++) picks.push(pool[rnd(pool.length)]);
 return picks;
}
function makeFoe(name,i){
 var d=ASPECTS[name];
 return {sp:name,tag:String.fromCharCode(65+i),lv:d.lv,hp:d.hp,maxhp:d.hp,
  atk:d.atk,def:d.def,agi:d.agi,dex:d.dex,facing:3,
  emo:{eager:0,happy:0,scared:0,angry:0},
  gone:false,berserk:false,flash:0,boss:!!d.boss,reason:null};
}
function startBattle(){
 drone(false);
 var names=randomPack();
 B={foes:[],running:false,boss:false,fled:false,transStart:performance.now(),turnQueue:[],qi:0,current:null,movesLeft:0};
 for(var i=0;i<names.length;i++) B.foes.push(makeFoe(names[i],i));
 placeParty(); placeFoes();
 MODE='battle'; UI=[{t:'main'}]; LOGS=[];
 var label = names.length>1 ? names.join(', ') : names[0];
 log('Shapes rise from the dark: '+label+'.');
 renderAll();
 setTimeout(function(){ if(B) startRound(); }, BATTLE_TRANS_MS+40);
}
function bossIntro(){
 drone(false);
 B={foes:[makeFoe('Moon Sovereign',0)],running:false,boss:true,fled:false,transStart:performance.now(),turnQueue:[],qi:0,current:null,movesLeft:0};
 placeParty(); placeFoes();
 MODE='battle'; UI=[{t:'main'}]; LOGS=[];
 log('The gate breathes. A voice like frost: "LITTLE MASKS. YOU CAME."');
 renderAll();
 setTimeout(function(){ if(B) startRound(); }, BATTLE_TRANS_MS+40);
}

/* ============ TITLE / END ============ */
function ctlTitle(){
 rows(
  [ btnEl('NEW GAME',startNew,'red') ],
  [ btnEl('LOAD GAME',loadGame,'blue') ],
  [ btnEl(MUTED?'SOUND: OFF':'SOUND: ON',toggleSound) ]
 );
 el('hint').textContent='Contact aspects to win cards \u2014 but not under a full moon.';
}
function startNew(){
 G=freshGame(); B=null; MODE='explore'; UI=[]; LOGS=[];
 placeAtStart();
 markExplored(); if(!MUTED) drone(true);
 log('You wake at the mouth of the catacombs. Three masks, one moon.');
 log('Tip: weaken an aspect, then CONTACT it \u2014 win its card, fuse masques at the Azure Room \ud83d\udeaa.');
 log('The catacombs reshape themselves each time you enter \u2014 and there is no waking the fallen.');
 renderAll();
}
function toTitle(){ MODE='title'; UI=[]; B=null; drone(false); LOGS=[]; renderAll(); }
function wipeSave(){
 try{
  if(!window.storage) return;
  window.storage.set('midnight-masque-save','').catch(function(){});
 }catch(e){}
}
function gameOver(){ B=null; MODE='gameover'; UI=[]; drone(false); SFX.die(); wipeSave(); renderAll(); }
function victory(){ MODE='victory'; UI=[]; drone(false); SFX.card(); wipeSave(); renderAll(); }

/* ============ KEYBOARD ============ */
document.addEventListener('keydown',function(e){
 var k=e.key.toLowerCase();
 if(MODE==='intro'){ MODE='title'; SFX.sel(); renderAll(); e.preventDefault(); return; }
 if(MODE==='explore' && UI.length===0){
  if(k==='arrowup'||k==='w'){ move(1); e.preventDefault(); }
  else if(k==='arrowdown'||k==='s'){ move(-1); e.preventDefault(); }
  else if(k==='arrowleft'||k==='a'){ turn(-1); e.preventDefault(); }
  else if(k==='arrowright'||k==='d'){ turn(1); e.preventDefault(); }
  else if(k==='enter'||k==='e'){ var a=tileAction(); if(a){ a.fn(); } e.preventDefault(); }
  else if(k==='m'){ openMenu(); e.preventDefault(); }
 } else if(k==='escape'){
  if(!(B&&B.running) && UI.length>0){ UI.pop(); SFX.back(); renderAll(); e.preventDefault(); }
 }
});

/* ============ BOOT ============ */
loop(0);
renderAll();

</script>
